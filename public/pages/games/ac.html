<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Full Page iFrame</title>
    <style>
        /* Remove default spacing */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        /* Make iframe fill entire viewport */
        iframe {
            border: none;
            width: 100vw;
            height: 100vh;
            display: block;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://dthesle.github.io/ECX/eagler-files/1.8/Astra_Client.html"
        allowfullscreen>
    </iframe>

</body>
</html>
